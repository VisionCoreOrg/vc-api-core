version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: visioncore_mysql
    restart: "no"
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    networks:
      - default
      - parking_global_net
    build: .
    container_name: api_core
    restart: "no"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # CRÍTICO: Sobrescreve o "localhost" do seu config.py para o nome do serviço do banco
      DB_HOST: mysql 
    depends_on:
      mysql:
        condition: service_healthy # Só sobe a API depois que o healthcheck do MySQL passar

networks:
  parking_global_net:
    external: true

volumes:
  mysql_data: